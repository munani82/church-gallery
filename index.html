<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 보안 차단 방지 및 외부 링크 허용 설정 -->
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    
    <title>서대구제일교회 최신 갤러리</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS는 이전과 동일하므로 생략하거나 그대로 사용하세요 */
        body { margin: 0; padding: 0; background-color: #fafafa; font-family: 'Noto Sans KR', sans-serif; color: #262626; }
        header { position: sticky; top: 0; background-color: #fff; border-bottom: 1px solid #dbdbdb; padding: 10px 0; text-align: center; z-index: 1000; }
        header h1 { margin: 0; font-size: 1.2rem; }
        .feed-container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .post-card { background-color: #fff; border: 1px solid #dbdbdb; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .post-header { padding: 14px; font-weight: 700; font-size: 0.95rem; }
        .post-image-container { width: 100%; background-color: #efefef; min-height: 250px; }
        .post-image-container img { width: 100%; height: auto; display: block; }
        .post-footer { padding: 12px 14px; font-size: 0.9rem; color: #444; }
        @media (max-width: 600px) { .post-card { border-radius: 0; border-left: none; border-right: none; } }
    </style>
</head>
<body>

    <header>
        <h1>⛪ 서대구제일교회 최신 갤러리</h1>
    </header>

    <div class="feed-container" id="gallery-feed">
        <div id="loading" style="text-align:center; padding:50px;">사진을 불러오는 중입니다...</div>
    </div>

    <script>
        async function loadGallery() {
            try {
                const response = await fetch('photos.json');
                const data = await response.json();
                const feed = document.getElementById('gallery-feed');
                feed.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'post-card';

                    // [핵심] 이미지 깨짐 방지를 위해 이미지 주소 앞에 프록시 서비스 추가
                    // 주소가 http인 경우 보안 차단을 피하기 위해 weserv 서비스를 이용합니다.
                    const safeImg = `https://images.weserv.nl/?url=${encodeURIComponent(item.img.replace('http://', ''))}`;

                    card.innerHTML = `
                        <div class="post-header">${item.title}</div>
                        <div class="post-image-container">
                            <img src="${safeImg}" alt="${item.title}" onerror="this.src='${item.img}'">
                        </div>
                        <div class="post-footer">#서대구제일교회 #교회앨범</div>
                    `;
                    feed.appendChild(card);
                });
            } catch (error) {
                console.error('실패:', error);
            }
        }
        loadGallery();
    </script>
</body>
</html>
